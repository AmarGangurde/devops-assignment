# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  app:
    driver: bridge
  monitoring:
    driver: bridge

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres-data:
  grafana-data:
  loki-data:
  prometheus-data:

    # ─── Services ─────────────────────────────────────────────────────────────────
services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: supachat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: supachat
      POSTGRES_PASSWORD: supachat
      POSTGRES_DB: supachat
    ports:
      - "5434:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - app
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U supachat" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ── Backend (Node.js API) ───────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: supachat-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_SSL: ${DATABASE_SSL:-true}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      PORT: 3001
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
    ports:
      - "3001:3001"
    networks:
      - app
      - monitoring
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://127.0.0.1:3001/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=supachat-backend"

  # ── Frontend (Next.js) ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api
    container_name: supachat-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: /api
    ports:
      - "3000:3000"
    networks:
      - app
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://127.0.0.1:3000/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Nginx Reverse Proxy ─────────────────────────────────────────────────────
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: supachat-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - app
    environment:
      - FRONTEND_UPSTREAM=${FRONTEND_UPSTREAM}
      - BACKEND_UPSTREAM=${BACKEND_UPSTREAM}
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://127.0.0.1/nginx-health" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 64M

  # ── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    build:
      context: ./prometheus
      dockerfile: Dockerfile
    container_name: supachat-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - prometheus-data:/prometheus
    networks:
      - monitoring
    environment:
      - BACKEND_TARGET=${BACKEND_TARGET}
      - CADVISOR_TARGET=${CADVISOR_TARGET}
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://127.0.0.1:9090/-/healthy" ]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 256M

  # ── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    build:
      context: ./grafana
      dockerfile: Dockerfile
    container_name: supachat-grafana
    restart: unless-stopped
    ports:
      - "4000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-supachat123}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
    networks:
      - monitoring
    depends_on:
      - prometheus
      - loki
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 256M

  # ── Loki ────────────────────────────────────────────────────────────────────
  loki:
    build:
      context: ./loki
      dockerfile: Dockerfile
    container_name: supachat-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - loki-data:/loki
    networks:
      - monitoring
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://127.0.0.1:3100/ready" ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 256M

  # ── DevOps Agent (Bonus) ────────────────────────────────────────────────────
  devops-agent:
    build:
      context: ./devops-agent
      dockerfile: Dockerfile
    container_name: supachat-devops-agent
    restart: unless-stopped
    ports:
      - "4001:4001"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      BACKEND_URL: http://backend:3001
      FRONTEND_URL: http://frontend:3000
      LOKI_URL: http://loki:3100
      PROMETHEUS_URL: http://prometheus:9090
      PORT: 4001
      NODE_ENV: production
    networks:
      - app
      - monitoring
    depends_on:
      - backend
      - loki
      - prometheus
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://127.0.0.1:4001/health" ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── cAdvisor (Container Monitoring) ──────────────────────────────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    container_name: supachat-cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - monitoring
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 128M

  # ── Promtail (Log Collection) ────────────────────────────────────────────────
  promtail:
    build:
      context: ./promtail
      dockerfile: Dockerfile
    container_name: supachat-promtail
    restart: unless-stopped
    environment:
      - LOKI_PUSH_URL=${LOKI_PUSH_URL}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    networks:
      - monitoring
    depends_on:
      - loki
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 64M
