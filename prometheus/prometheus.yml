global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'supachat'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'supachat-backend'
    static_configs:
      - targets: ['backend:3001']
        labels:
          service: 'supachat-backend'
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    scrape_interval: 15s
